id = "plugin-dask-scheduler"
name = "Dask Scheduler"
version = "0.1.0"
author = "Cluster Runtime Team"
description = "Distributed scheduling via Dask. Uses the Python Runtime for execution and packages."
plugin_type = "scheduler"
factory = "plugin-dask-scheduler"
mandatory = true
default = true
app_compat = ">=0.1.0,<0.2.0"
dependencies = ["plugin-python-runtime"]
capabilities = [
  "Distributed Scheduling",
  "Distributed Workers",
  "Task Submission",
  "Cluster Monitoring",
  "Dashboard Integration",
]
